apiVersion: apps/v1
kind: Deployment
metadata:
  name: newbank-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: newbank-ui
  template:
    metadata:
      labels:
        app: newbank-ui
    spec:
      containers:
      - name: ui
        image: vaibhav411007/newbank-ui:latest
        ports:
        - containerPort: 3000
